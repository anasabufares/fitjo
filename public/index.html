<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FitJo — Gyms of Jordan</title>

  <!-- Installable web app (Add to Home Screen) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitJo" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Access gate: covers the app until the user signs up + verifies their phone -->
  <div class="access-gate" id="accessGate"></div>

  <!-- Coach portal (gym staff) overlay -->
  <div class="coach-portal" id="coachPortal"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">
        <span class="logo">🏋️</span>
        <span>FitJo<small id="brandTag">Gyms of Jordan</small></span>
      </div>
      <div class="spacer"></div>
      <select id="currencySel" class="control" title="Currency"></select>
      <button id="langToggle" class="control" style="font-weight:700">العربية</button>
      <button id="themeToggle" class="icon-btn" title="Theme">🌙</button>
      <div id="authSlot"></div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="wrap">
      <h1 id="heroTitle">Find your gym in Amman</h1>
      <p id="heroSub">Compare facilities, hours, pool times, trainers and prices — then subscribe in one tap.</p>
      <div class="searchbar">
        <span style="font-size:18px;align-self:center;padding-inline-start:6px">🔍</span>
        <input id="searchInput" type="text" placeholder="Search by gym name or area…" />
      </div>
    </div>
  </section>

  <!-- Services hub (Careem-style): one tap to each part of the app -->
  <section class="services">
    <div class="wrap">
      <div class="svc-head">
        <span class="svc-title" id="svcTitle">Services</span>
        <button class="svc-points" id="svcPoints" style="display:none">⭐ <b id="svcPointsNum">0</b> <span id="svcPointsLbl">points</span></button>
      </div>
      <div class="svc-grid">
        <button class="svc" id="svcGym"><span class="svc-ico">🏋️</span><span class="svc-lbl" id="svcGymLbl">Gym</span></button>
        <button class="svc" id="svcNutrition"><span class="svc-ico">🍎</span><span class="svc-lbl" id="svcNutritionLbl">Nutrition</span></button>
        <button class="svc" id="svcSupps"><span class="svc-ico">💊</span><span class="svc-lbl" id="svcSuppsLbl">Supplements</span></button>
        <button class="svc" id="svcRank"><span class="svc-ico">🏆</span><span class="svc-lbl" id="svcRankLbl">Rank</span></button>
      </div>
    </div>
  </section>

  <main class="wrap">
    <div class="layout">
      <!-- Filters -->
      <aside class="panel filters" id="filtersPanel">
        <button class="filters-head" id="filtersToggle" type="button">
          <span id="lblFilters">Filters</span>
          <span class="filters-head-right">
            <span class="filters-count" id="filtersCount"></span>
            <span class="chev" id="filtersChev">▾</span>
          </span>
        </button>
        <div id="filtersBody">

        <div class="field">
          <label id="lblArea">Area</label>
          <select id="areaSel"></select>
        </div>

        <div class="field">
          <label id="lblFacilities">Facilities</label>
          <div class="chips" id="facilChips"></div>
        </div>

        <div class="field">
          <label id="lblPool">Pool</label>
          <div class="chips" id="poolChips"></div>
        </div>

        <div class="field">
          <label id="lbl247">24/7</label>
          <div class="chips" id="h247Chips"></div>
        </div>

        <div class="field">
          <label id="lblAccess">Access</label>
          <div class="chips" id="accessChips"></div>
        </div>

        <div class="field">
          <label id="lblAge">Minimum age</label>
          <select id="ageSel"></select>
        </div>

        <div class="field">
          <label id="lblPrice">Max monthly price</label>
          <input id="priceRange" type="range" min="20" max="80" step="1" value="80" />
          <div class="range-val" id="priceVal"></div>
        </div>

        <div class="field">
          <label id="lblSort">Sort by</label>
          <select id="sortSel"></select>
        </div>

        <button class="linkbtn" id="clearBtn">Clear filters</button>
        </div>
      </aside>

      <!-- Content -->
      <section>
        <!-- LIST VIEW -->
        <div id="listWrap">
          <div class="results-head">
            <div class="tabs">
              <button class="tab active" id="tabAll">All gyms</button>
              <button class="tab" id="tabFav">Favorites</button>
            </div>
            <div class="results-tools">
              <button class="near-btn" id="nearMeBtn" type="button">📍 <span id="nearMeLbl">Near me</span></button>
              <div class="view-toggle">
                <button data-view="list" id="viewListBtn" class="active" type="button">☰ <span id="viewListLbl">List</span></button>
                <button data-view="map" id="viewMapBtn" type="button">🗺️ <span id="viewMapLbl">Map</span></button>
              </div>
            </div>
            <span class="count" id="resultCount"></span>
          </div>
          <div class="grid" id="grid" style="display:grid"></div>
          <div id="mapWrap" style="display:none"><div id="map"></div></div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="detailView" style="display:none"></div>
      </section>
    </div>
  </main>

  <div class="footer">
    FitJo · Prototype with sample data · Amman, Jordan 🇯🇴
  </div>

  <!-- Payment explainer modal -->
  <div class="modal-back" id="modalBack">
    <div class="modal">
      <h3 id="modalTitle">How payment will work</h3>
      <div id="modalBody"></div>
      <button class="btn" id="modalClose" style="width:100%;margin-top:6px">Close</button>
    </div>
  </div>

  <!-- Auth / account modal -->
  <div class="auth-back" id="authBack">
    <div class="auth-modal" id="authModal"></div>
  </div>

  <!-- Compare tray + modal -->
  <div class="cmp-tray" id="cmpTray"></div>
  <div class="auth-back" id="cmpBack">
    <div class="auth-modal wide" id="cmpModal"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Turn on the REAL AI food-photo analyzer: uncomment the next line after deploying (see AI-SETUP.md). -->
  <!-- <script>window.FITJO_CONFIG = { aiEndpoint: "/.netlify/functions/analyze-food" };</script> -->

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/support.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/nutrition.js"></script>
  <script src="js/membership.js"></script>
  <script src="js/workouts.js"></script>
  <script src="js/rank.js"></script>
  <script src="js/inbody.js"></script>
  <script src="js/supplements.js"></script>
  <script src="js/staff.js"></script>
  <script src="js/map.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
